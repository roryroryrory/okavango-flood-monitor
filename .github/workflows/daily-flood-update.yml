name: Daily Flood Data Update

on:
  schedule:
    # Runs every day at 08:00 UTC (10:00 SAST / CAT)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  update-flood-data:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scrape_flood_data.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore

      - name: Upload flood_data.json to SiteGround
        run: |
          curl -T flood_data.json \
            --ftp-create-dirs \
            --ssl \
            --insecure \
            --user "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}" \
            "ftp://${{ secrets.FTP_HOST }}/${{ secrets.FTP_PATH }}/flood_data.json"

      - name: Upload flood_timeseries.json to SiteGround
        run: |
          curl -T flood_timeseries.json \
            --ftp-create-dirs \
            --ssl \
            --insecure \
            --user "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}" \
            "ftp://${{ secrets.FTP_HOST }}/${{ secrets.FTP_PATH }}/flood_timeseries.json"
